name: Viral Video Bot

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # ✅ FIXED INSTALL STEP (Pillow compatibility)
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3
          pip install pillow==9.5.0
          pip install gtts numpy imageio imageio-ffmpeg

      - name: Run Bot
        working-directory: src
        run: python main.py

      # 🔍 Debug (shows all files including assets & output)
      - name: Debug Files
        run: ls -R

      # 📦 Upload final video
      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: viral-video
          path: output/
